<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Promotion Form</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6fb;font-size:20px}
.wrap{padding:10px}
.section{background:#fff;padding:14px;border-radius:12px;margin-bottom:12px}
select,input,button{width:100%;padding:12px;font-size:18px;margin-top:5px;border-radius:8px}
button{background:#1976e9;color:#fff;border:none}
.student-name{font-size:28px;font-weight:bold}
.nav{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>

</head>
<body>

<div class="wrap">

<div class="section">
<h2>Promotion Form</h2>

<select id="school" onchange="onSchoolChange()"></select>
<select id="className" onchange="loadStudents()"></select>
<input id="search" oninput="applyFilter()" placeholder="Search">
</div>

<div id="progress" class="section"></div>
<div id="studentBox"></div>

<div class="nav">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div>

</div>

<script>
const API='https://script.google.com/macros/s/AKfycbxN6JX5ClM_X0stmP4o_FMka4MgiGqgS8-e1T6tF39G2yw_FUsSscbVUjbF0t-WPUwtLg/exec';

let data,students=[],filtered=[],i=0;

async function api(p){
 let u=new URL(API);
 Object.keys(p).forEach(k=>u.searchParams.set(k,p[k]));
 return (await fetch(u)).json();
}

async function init(){
 let r=await api({action:'init'});
 data=r.data;

 school.innerHTML='<option>Select School</option>';
 data.schools.forEach(s=>{
  let o=document.createElement('option');
  o.value=s;o.text=s;
  school.appendChild(o);
 });
}

function onSchoolChange(){
 className.innerHTML='<option>Select Class</option>';
 (data.classMap[school.value]||[]).forEach(c=>{
  let o=document.createElement('option');
  o.value=c;o.text=c;
  className.appendChild(o);
 });
}

async function loadStudents(){
 let r=await api({action:'students',school:school.value,className:className.value});
 students=r.data;
 filtered=[...students];
 i=0;
 show();
}

function applyFilter(){
 let q=search.value.toLowerCase();
 filtered=students.filter(s=>s.name.toLowerCase().includes(q));
 i=0;show();
}

function getNext(c,s){
 if(s==="Promoted"){
  let m={'Kachi':'I','I':'II','II':'III','III':'IV','IV':'V','V':'VI','VI':'VII','VII':'VIII','VIII':'IX','IX':'X','X':'XI','XI':'XII'};
  return m[c]||c;
 }
 return c; // 🔥 same class for Dropout, Passout, Retained
}

function show(){
 if(!filtered.length)return;

 let s=filtered[i];

 studentBox.innerHTML=`
 <div class="section">
 <div class="student-name">${s.name}</div>
 <div>${s.father}</div>
 <div>Class: ${s.currentClass}</div>

 <select id="status">
 ${data.statusList.map(x=>`<option ${x==s.status?'selected':''}>${x}</option>`).join('')}
 </select>

 <input id="newClass" value="${s.newClass||''}" readonly>

 <button onclick="save()">Save</button>
 </div>
 `;

 status.onchange=()=>{
  newClass.value=getNext(s.currentClass,status.value);
 };
}

async function save(){
 let s=filtered[i];

 let r=await api({
  action:'save',
  rowNumber:s.rowNumber,
  currentClass:s.currentClass,
  status:status.value
 });

 newClass.value=r.data.newClass;

 setTimeout(()=>{
  if(i<filtered.length-1){
   i++;show();
  }
 },300);
}

function next(){if(i<filtered.length-1){i++;show();}}
function prev(){if(i>0){i--;show();}}

init();
</script>

</body>
</html>
